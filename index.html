<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Job Application Tracker</title>
    <style type="text/tailwindcss">
     
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1 class="text-3xl font-bold text-[#0f2d52] mb-8">Job Application Tracker</h1>
        <div>
           <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <p class="text-slate-500 font-medium mb-1">Total</p>
                <p id="total-count" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <p class="text-slate-500 font-medium mb-1">Interview</p>
                <p id="interview-count" class="text-3xl font-bold text-emerald-500">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <p class="text-slate-500 font-medium mb-1">Rejected</p>
                <p id="rejected-count" class="text-3xl font-bold text-red-500">0</p>
            </div>
        </div>
<hr class="mb-10">

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-[32px] font-bold text-[#002C5C]">Available Jobs</h2>
            <span id="job-tally" class="text-slate-400 text-sm font-medium">0 jobs</span>
        </div>
         <div class="flex gap-2 mb-8" id="filter-buttons">
            <button onclick="filterJobs('all')" data-filter="all" class="filter-btn px-6 py-1.5 rounded-md bg-blue-600 text-white text-sm transition shadow-md">All</button>
            <button onclick="filterJobs('interview')" data-filter="interview" class="filter-btn px-6 py-1.5 rounded-md bg-white border border-slate-200 text-slate-500 text-sm hover:bg-slate-50">Interview</button>
            <button onclick="filterJobs('rejected')" data-filter="rejected" class="filter-btn px-6 py-1.5 rounded-md bg-white border border-slate-200 text-slate-500 text-sm hover:bg-slate-50">Rejected</button>
        </div>

      </div>
              
      
    </main>

  </body>
</html>
